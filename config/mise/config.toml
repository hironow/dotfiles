# Global mise config for hironow's machines. Symlinked to
# ~/.config/mise/config.toml by `just deploy`.
#
# Project-pinned tools live in /Users/nino/dotfiles/mise.toml (ADR 0006).
# This file holds user-level tool defaults, security/quarantine settings,
# and backend tweaks that follow CLAUDE.md global rules.

[tools]
bun = "latest"
go = "latest"
node = "lts"
just = "latest"
rust = "1.96.0"
# opentofu — terraform-compatible IaC. Required by `just test-iac`
# so `mise x -- tofu` resolves from the non-mise-activated bash
# sub-shell that `just` spawns under ADR 0023 (mise-activate-only,
# no shims PATH). Pinned for repeatable IaC test runs across machines.
opentofu = "1.11.5"
uv = "latest"
kotlin = "latest"
java = "latest"
gradle = "latest"
python = "latest"
vp = "latest"
markdownlint-cli2 = "latest"
# prek — pre-commit runner. Project-pinned in the repo mise.toml for
# the devcontainer build, but declared here too so it resolves on the
# Mac host outside the dotfiles dir (ADR 0023 is activate-only with no
# shims PATH, so a repo-only tool is invisible elsewhere).
prek = "latest"
# portless (local-dev HTTPS proxy). De-orphaned from the retired
# pnpm-global subsystem (ADR 0017): declare it here so `mise ls` shows
# a config source instead of an untracked orphan.
"npm:portless" = "0.13.0"

# AI agent CLIs. Project-pinned in the repo mise.toml so Coder
# workspaces boot with them ready; declared here at "latest" so they
# also resolve globally on the Mac host (ADR 0023 activate-only: a
# repo-only tool is only on PATH inside the dotfiles dir). The global
# minimum_release_age="7d" quarantine below still applies, so these
# track the newest release that is at least 7 days old. Authenticate
# on first use (`codex login`, `claude /login`, `gemini auth`,
# `copilot auth`, `pi auth`).
"npm:@openai/codex" = "latest"
"npm:@google/gemini-cli" = "latest"
# claude-code hardlinks its native binary in a postinstall (install.cjs);
# mise's npm backend defaults to --ignore-scripts=true, which would leave
# the stub and break `claude` at runtime. npm_args re-enables scripts for
# this one tool (npm honors the last --ignore-scripts flag).
"npm:@anthropic-ai/claude-code" = { version = "latest", npm_args = "--ignore-scripts=false" }
"npm:@github/copilot" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"

[settings]
# Disable asdf-style .python-version / .nvmrc auto-detection so only
# mise.toml / .tool-versions drive tool resolution.
idiomatic_version_file_enable_tools = []
# Block surprise installs when invoking a missing command. `mise install`
# must be explicit.
not_found_auto_install = false
# `mise use <tool>` (without a version) records the currently pinned
# version instead of "latest", keeping mise.toml reproducible
# (ADR 0006 pinned-versions philosophy).
pin = true
# Match the npmrc `min_release_age=7` quarantine for supply-chain risk
# (mirrors uv's `exclude-newer = "7 days"`).
minimum_release_age = "7d"

[settings.python]
# Auto-source uv-managed `.venv` when entering a Python project. uv is
# the project-wide Python package manager per CLAUDE.md global rules.
uv_venv_auto = "source"

[settings.node]
# Auto-install corepack shims so pnpm/yarn delivered via corepack work
# out of the box (ADR 0017 — pnpm is corepack-only).
corepack = true
