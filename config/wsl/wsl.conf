# Recommended WSL settings for this dotfiles environment.
#
# Apply to /etc/wsl.conf (root-owned; needs sudo), preserving any existing
# `[user] default=<you>` line, then run `wsl --shutdown` from Windows to
# reload. `just wsl-conf` previews this against the live /etc/wsl.conf and
# prints the apply steps.
[boot]
systemd=true

[interop]
# Keep the Windows PATH out of WSL so /mnt/<drive> binaries do not shadow
# WSL-native tools (mise, git, docker, ...). See `just validate-path-windows`
# / `just doctor` (the PATH-windows check).
appendWindowsPath=false
