# Static portless aliases for vendored local-dev HTTP UIs.
#
# Registered by `just portless-up` via `portless alias <name> <port>`
# (portless: vercel-labs/portless — HTTPS reverse proxy mapping <name>.localhost
# to a fixed local port; static aliases persist in ~/.portless/routes.json).
#
# Only HTTP(S) UIs are listed here. portless cannot proxy raw TCP, so datastore
# wire protocols (postgres 5433 / pgadapter 55432 / neo4j bolt 7687 / bigtable
# gRPC 8086 / spanner gRPC 9010 / qdrant gRPC 6334 / elasticsearch transport
# 9300) are intentionally NOT aliased and stay on their 127.0.0.1 ports.
#
# Format: flat `name: port` entries under `aliases:`. `just portless-up` parses
# this file; comments (`#`) and blank lines are ignored.
aliases:
  # --- emulator (emulator/compose.yaml) HTTP UIs ---
  firebase: 4000          # Firebase Emulator Suite UI       -> https://firebase.localhost
  neo4j: 7474             # Neo4j Browser (HTTP)              -> https://neo4j.localhost
  a2a-inspector: 8081     # A2A Inspector UI                  -> https://a2a-inspector.localhost
  mcp-inspector: 6274     # MCP Inspector UI                  -> https://mcp-inspector.localhost
  mlflow: 5252            # MLflow UI                         -> https://mlflow.localhost
  qdrant: 6333            # Qdrant REST / Dashboard           -> https://qdrant.localhost
  elasticsearch: 9200     # Elasticsearch REST                -> https://elasticsearch.localhost

  # --- telemetry (telemetry/compose.yaml) HTTP UIs ---
  grafana: 3010           # Grafana                           -> https://grafana.localhost
  prometheus: 9091        # Prometheus                        -> https://prometheus.localhost
  tempo: 3200             # Tempo HTTP API                    -> https://tempo.localhost
  loki: 3100              # Loki HTTP API                     -> https://loki.localhost

  # --- emulate API emulators (emulator/compose.yaml `emulate` service, base 4100) ---
  # NOTE: emulate (emulate@0.6.0) assigns ports as base+index in its internal
  # registry order for the ENABLED subset and does NOT support per-service port
  # pinning. The ports below are therefore best-effort and MUST be verified on
  # first run (`docker compose -f emulator/compose.yaml logs emulate`) before
  # relying on them. Uncomment + correct after verifying, then re-run portless-up.
  #
  # Confirmed available in emulate@0.6.0 published CLI: github google slack apple microsoft
  # Requested but UNVERIFIED in published CLI (plugins shipped as deps): stripe clerk okta resend
  #
  # github: 4100
  # google: 4101
  # slack: 4102
  # apple: 4103
  # microsoft: 4104
  # stripe: 4105
  # clerk: 4106
  # okta: 4107
  # resend: 4108
