[tools]
# Pinned versions per ADR 0006 (Accepted 2026-05-02). One pin
# applies to Mac, Linux (dev container workspace), and Windows
# native (MVP scope; see ADR 0018). Bump these by hand in a dedicated PR; the
# build-time consistency check in tests/test_mise_pin_consistency.py
# fails the image build if these drift from the SHA-verified
# constants in .devcontainer/features/dotfiles-tools/install.sh.
just = "1.51.0"
markdownlint-cli2 = "0.22.1"
prek = "0.4.3"
uv = "0.11.17"
# `vp` is the mise registry alias for npm:vite-plus (NOT the
# unrelated `vp` npm package). Pin to vite-plus's actual version.
vp = "0.1.23"

# Node runtime. The npm-backed AI CLIs below have a `#!/usr/bin/env
# node` shebang that needs node on PATH at *runtime*, not just at
# the image-build time when mise installs them. The
# `ghcr.io/devcontainers/features/node:1` feature in devcontainer.json
# does install node into /usr/local/bin, but on Coder workspaces the
# `/home/<user>:/root` volume mount can mask the symlink chain. Pin
# node here so /opt/mise/installs/node/24.16.0/bin/node lives outside
# the volume-mount path; mise's shim in /opt/mise/shims wins PATH
# resolution against any bind-mount issue.
node = "24.16.0"

# AI agent CLIs. Installed at build time so the Coder workspace
# boots with them ready on PATH; operators authenticate them on
# first use (`codex login`, `claude /login`, `copilot auth`, `pi auth`;
# antigravity authenticates on first run). Source: 2026-05 latest stable.
"npm:@openai/codex" = "0.135.0"
# claude-code ships its ~248MB native binary as per-platform npm
# optionalDependencies that a postinstall (install.cjs) hardlinks over a
# stub. mise's npm backend installs with --ignore-scripts=true by default,
# so the optional dep downloads but the postinstall never runs, leaving the
# stub — `claude` then errors at runtime with "native binary not installed".
# npm_args re-enables scripts for this one tool (npm honors the last
# --ignore-scripts flag, so this overrides mise's default).
"npm:@anthropic-ai/claude-code" = { version = "2.1.158", npm_args = "--ignore-scripts=false" }
"npm:@github/copilot" = "1.0.56"
"npm:@earendil-works/pi-coding-agent" = "0.78.0"

# antigravity (Google's agentic coding CLI) — replaces gemini-cli.
# Distributed as GitHub-release binaries (not npm), installed via mise's
# github backend (SLSA provenance verified); the archived binary is
# `antigravity`, so the exe must be named explicitly. COOLDOWN EXCEPTION:
# antigravity-cli's first release was 2026-06-01, so no version is yet
# >=7 days old (the repo's usual 7-day quarantine); pinned to the latest
# 1.0.6 by request.
"github:google-antigravity/antigravity-cli" = { version = "1.0.6", exe = "antigravity" }

# Cloud-service dev CLIs (npm-distributed). Explicit `npm:` backend to
# avoid any mise registry-alias ambiguity. Concrete pins per ADR 0006
# (no `latest` in this file); bump by hand like the tools above. Each
# was the newest release at least 7 days old when pinned.
#   cf          -> Cloudflare CLI (blog.cloudflare.com cf local explorer)
#   resend-cli  -> Resend CLI (resend.com/docs/cli)
#   @stripe/cli -> Stripe CLI (docs.stripe.com, npm install method;
#                  the legacy `stripe-cli` package is deprecated)
"npm:cf" = "0.0.6"
"npm:resend-cli" = "2.3.0"
"npm:@stripe/cli" = "0.0.1"

# `~/.npmrc` may set `min-release-age=7` (7-day quarantine, mirrors
# uv's `exclude-newer = "7 days"`). That blocks `mise install` of
# brand-new npm-backed tools (e.g. vp). Override only for mise-driven
# npm calls — the host npmrc is untouched, so app-level installs in
# other repos still get the quarantine.
[env]
npm_config_min_release_age = "0"
