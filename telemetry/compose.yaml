services:
  # OpenTelemetry Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.155.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
      - "127.0.0.1:8888:8888"   # Prometheus metrics exposed by the collector
      - "127.0.0.1:8889:8889"   # Prometheus exporter metrics
      - "127.0.0.1:13133:13133" # health_check extension
      - "127.0.0.1:55679:55679" # zpages extension
    depends_on:
      - tempo
      - prometheus

  # Tempo for traces. Tempo 3.0's image is distroless (no shell/chown),
  # and 3.0 provisions its own data dir on a fresh named volume as uid
  # 10001, so the previous `tempo-init` chown sidecar is both impossible
  # and unnecessary — removed. Migration note: a root-owned `tempo-data`
  # volume left over from Tempo 2.x must be recreated
  # (`docker volume rm telemetry_tempo-data`) before the first 3.0 start.
  tempo:
    image: grafana/tempo:3.0.2
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/tempo/tempo-config.yaml:/etc/tempo.yaml
      - tempo-data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"   # tempo
      - "127.0.0.1:14268:14268" # jaeger ingest

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"

  # Loki for logs (uses /tmp/loki internally, no external volume needed)
  loki:
    image: grafana/loki:3.7.3
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/loki-config.yaml
    ports:
      - "127.0.0.1:3100:3100"

  # Grafana
  grafana:
    image: grafana/grafana:13.0.3
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3010:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  grafana-data:
  prometheus-data:
  tempo-data:

networks:
  default:
    name: shared-otel-net
    external: true
