name: Shellcheck Linting

# Restrict push to main so feature branch pushes do not trigger
# extra runs (= pull_request covers PR review、 既存
# iac-test.yaml / test-just.yaml と同 pattern)。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # shellcheck は ubuntu-latest ランナーにプリインストール済み。
      # CI は mise 非依存 (mise.toml はローカル開発用)。
      - run: shellcheck *.sh
