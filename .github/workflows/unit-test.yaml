name: Unit Tests

# Host-side unit gate: agent hook guards (tests/unit/), the plugin
# check-scope drift gate, the marketplace manifest pins, and the
# always-loaded instruction budget. `just ci` runs the same gate locally;
# before this workflow GitHub only ran shellcheck / devcontainer sandbox /
# IaC, so tests/unit/ never gated a PR (e.g. editing one check-scope copy
# directly would have passed CI).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit tests + instruction budget
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # ADR 0028: assert every uv project routes through the flatt PyPI mirror
      # and no committed lock falls back to raw pypi.org. Pure grep (no uv /
      # network), so it runs before the uv install and fails fast.
      - name: Check uv flatt index (ADR 0028)
        run: bash scripts/check_uv_flatt_index.sh

      # CI は mise 非依存 (mise.toml はローカル開発用)。uv は公式
      # インストーラで導入。just は recipe-propagation テスト
      # (tests/unit/test_plugin_check_scope.py) が実行する — ubuntu の
      # apt パッケージは 1.21 で `[group]` attribute (1.27+) を parse
      # できないため、uv tool で最新を ~/.local/bin に入れる。
      # jq / bash はランナーにプリインストール済み。
      - name: Install uv and just
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" tool install rust-just

      - name: Run unit tests
        run: uvx pytest -q -ra tests/unit/

      # Keep --max in sync with the `instruction-budget` recipe in the
      # justfile (the recipe is not callable here because the justfile
      # wraps tools with `mise exec`).
      - name: Instruction budget
        run: uv run scripts/instruction_budget.py --max 40 ROOT_AGENTS.md ROOT_CLAUDE.md
