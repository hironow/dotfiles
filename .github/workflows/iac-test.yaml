name: IaC Tests (OpenTofu)

# Runs `just test-iac` for the Coder workspace template
# (exe/coder/templates/dotfiles-devcontainer/) on every push and PR.
# Matches the local 'just test-iac' recipe so CI and dev stay in
# lockstep. ADR 0024 (in the runops-gateway repo) is the canonical
# rationale for splitting IaC tests across `tofu test` (variable
# defaults / validation) and pytest (heredoc body content,
# systemd-analyze).
#
# Uses jdx/mise-action so the OpenTofu version is pinned via
# mise.toml (= the same binary local devs and CI resolve), avoiding
# the need to add opentofu/setup-opentofu to the repo's actions
# allow list.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-iac:
    name: tofu test (Coder template)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: tofu test
        working-directory: exe/coder/templates/dotfiles-devcontainer
        run: |
          tofu init -backend=false
          tofu test
