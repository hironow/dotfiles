name: IaC Tests (OpenTofu)

# Two IaC gates on every push and PR:
#   1. `tofu test` for the Coder workspace template
#      (exe/coder/templates/dotfiles-devcontainer/).
#   2. `tofu validate` for the exe stack (tofu/exe/) — offline, no secrets
#      and no GCS backend, so a provider-constraint bump (e.g. hashicorp/google
#      ~> 7.0) is schema-checked in CI rather than only by a local plan.
# ADR 0024 (in the runops-gateway repo) is the canonical rationale
# for splitting IaC tests across `tofu test` (variable defaults /
# validation) and pytest (heredoc body content, systemd-analyze).
#
# Uses opentofu/setup-opentofu rather than the devcontainer's
# MISE_OFFLINE=1 environment because pinning OpenTofu through
# mise.toml would require rebuilding the devcontainer base image
# (the ADR-0006 flow), which is out of scope for this gate. The
# action lives outside the dotfiles 'allow list' historically; the
# operator added 'opentofu/setup-opentofu@*' to the repo's actions
# allow list when this workflow first ran.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-iac:
    name: tofu test (Coder template)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: 1.12.3

      - name: tofu test
        working-directory: exe/coder/templates/dotfiles-devcontainer
        run: |
          tofu init -backend=false
          tofu test

  validate-exe:
    name: tofu validate (exe stack)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: 1.12.3

      # No secrets, no state: `-backend=false` resolves providers from the
      # required_providers constraints and the terraform{} encryption block
      # falls back to its in-file sentinel passphrase, so `validate` checks
      # the config against the pinned provider schemas (e.g. the google v7
      # bump) without touching the GCS backend. Mirrors `just exe-validate`.
      - name: tofu validate (exe)
        working-directory: tofu/exe
        run: |
          tofu fmt -check -diff
          tofu init -backend=false -input=false
          tofu validate
