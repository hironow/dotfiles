name: Nix Tests

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "home.nix"
      - "nix/**"
      - "install.sh"
      - "tests/docker/Nix*.Dockerfile"
  pull_request:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "home.nix"
      - "nix/**"
      - "install.sh"
      - "tests/docker/Nix*.Dockerfile"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Build Home Manager configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Home Manager config
        run: |
          SYSTEM=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          nix run home-manager -- build --flake ".#root@${SYSTEM}" --impure

  docker-hm-test:
    name: Docker Home Manager test
    runs-on: ubuntu-latest
    needs: nix-build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test
        run: docker build -f tests/docker/NixHomeManager.Dockerfile .

  docker-install-test:
    name: Docker install.sh E2E test
    runs-on: ubuntu-latest
    needs: nix-build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test
        run: docker build -f tests/docker/NixInstallTest.Dockerfile .
