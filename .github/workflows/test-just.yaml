name: Just Sandbox Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run just tests in Docker sandbox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Setup mise (tool versions)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          experimental: true

      - name: Show Docker and tool versions
        run: |
          docker version
          just --version
          uv --version || true

      - name: Cache uv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Prebuild sandbox image (warm cache)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: tests/docker/JustSandbox.Dockerfile
          tags: |
            dotfiles-just-sandbox:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GITHUB_TOKEN bumps mise/aqua's GitHub API rate limit from 60 to
          # 5000/hr, which is required for `mise install` during the build
          # step (mise resolves "latest" against api.github.com).
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        env:
          PYTEST_ADDOPTS: --junitxml=pytest-report.xml
        run: |
          just test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-report
          path: pytest-report.xml
