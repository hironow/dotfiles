name: Just Sandbox Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run just tests in dev container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Build the dev container declared by .devcontainer/devcontainer.json
      # (debian-12 + features) and run `just test` inside it. The action
      # handles BuildKit, GHA cache wiring, and feature resolution so the
      # local IDE / Coder workspace / CI all consume the same image graph.
      #
      # imageName=dotfiles-just-sandbox tags the resulting image so the
      # pytest fixture in tests/test_just_sandbox.py finds it via
      # `docker image inspect` (no rebuild).
      - name: Run just test inside dev container
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3.1900000449
        with:
          imageName: dotfiles-just-sandbox
          imageTag: latest
          push: never
          cacheFrom: ghcr.io/${{ github.repository_owner }}/dotfiles-just-sandbox
          runCmd: just test
          env: |
            PYTEST_ADDOPTS=--junitxml=/root/dotfiles/pytest-report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-report
          path: pytest-report.xml
